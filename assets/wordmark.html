<!-- @dsCard group="Brand" viewport="700x210" name="Wordmark" subtitle="No logo file provided — type-set wordmark is the brand mark" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); }
  .stage { position: relative; height: 210px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; overflow: hidden; }
  .grid { position: absolute; inset: 0; }
  .mark { font-family: var(--font-display); font-weight: 700; font-size: 72px; letter-spacing: var(--tracking-tighter); text-transform: uppercase; line-height: 1; background: var(--gradient-silver); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; transform: translateZ(0); filter: drop-shadow(0px 12px 24px rgba(0,0,0,0.8)) drop-shadow(0px 4px 8px rgba(0,0,0,0.6)); }
  .sub { font-family: var(--font-devanagari); font-size: 14px; color: var(--text-secondary); letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="stage">
  <div class="grid fs-grid"></div>
  <div class="fs-grain"></div>
  <div class="mark">FinSathi</div>
  <div class="sub">आपका पैसा, आपकी भाषा</div>
</div>
</body>
</html>
