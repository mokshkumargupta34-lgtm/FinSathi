<!-- @startingPoint section="Website screens" subtitle="Money — financial overview, transactions, savings goals, budget breakdown" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FinSathi — Money</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg-page); color: var(--text-primary); font-family: var(--font-body); }
  html { scroll-behavior: smooth; }
  a { color: inherit; }

  /* ---------- Navigation ---------- */
  .fsd-nav { position: sticky; top: 0; z-index: 100; background: rgba(5, 9, 20, 0.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-hairline); }
  .fsd-nav-inner { max-width: 1240px; margin: 0 auto; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 0 32px; }
  .fsd-nav-center { position: relative; display: flex; align-items: center; gap: 4px; }
  .fsd-trigger { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--text-muted); background: transparent; border: none; cursor: pointer; font-family: var(--font-body); text-decoration: none; transition: color 0.2s, background 0.2s; }
  .fsd-trigger:hover, .fsd-trigger[data-open="true"], .fsd-trigger[data-active="true"] { color: var(--text-primary); background: rgba(255, 255, 255, 0.05); }
  .fsd-trigger > svg { transition: transform 0.3s var(--ease-tactile); }
  .fsd-trigger[data-open="true"] > svg { transform: rotate(180deg); }

  .fsd-menu-panel { position: absolute; top: calc(100% + 14px); left: 50%; transform: translateX(-50%); background: linear-gradient(145deg, rgba(22, 44, 109, 0.45) 0%, rgba(10, 16, 29, 0.94) 100%); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border-glass); border-radius: 20px; box-shadow: var(--shadow-glass); padding: 14px; transform-origin: top center; animation: fsdMenuIn 0.3s var(--ease-expo); }
  @keyframes fsdMenuIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px) scale(0.97); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }

  .fsd-gcard { position: relative; isolation: isolate; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; gap: 22px; min-height: 124px; padding: 16px; border-radius: 14px; border: 1px solid var(--border-soft); background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%); text-decoration: none; transition: border-color 0.2s, transform 0.2s var(--ease-tactile); }
  .fsd-gcard:hover { border-color: var(--border-accent); transform: translateY(-2px); }
  .fsd-gcard-grid { position: absolute; inset: -25%; z-index: -1; transform: skewY(-12deg) translateY(10px); background-size: 26px 26px; background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px); mask-image: linear-gradient(225deg, black, transparent 70%); -webkit-mask-image: linear-gradient(225deg, black, transparent 70%); transition: transform 0.25s var(--ease-tactile); }
  .fsd-gcard:hover .fsd-gcard-grid { transform: skewY(-12deg) translateY(0); }
  .fsd-gcard-glow { position: absolute; inset: -10%; z-index: -1; opacity: 0; background: radial-gradient(circle at 80% 0%, rgba(59, 130, 246, 0.18), transparent 60%); transition: opacity 0.25s; }
  .fsd-gcard:hover .fsd-gcard-glow { opacity: 1; }

  .fsd-sitem { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; color: var(--text-muted); font-size: 14px; text-decoration: none; transition: background 0.15s, color 0.15s; }
  .fsd-sitem:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
  .fsd-sitem .fsd-arrow { margin-left: auto; opacity: 0; transform: translateX(-6px); transition: opacity 0.2s, transform 0.2s var(--ease-tactile); display: flex; }
  .fsd-sitem:hover .fsd-arrow { opacity: 1; transform: translateX(0); }

  .fsd-lang-panel { position: absolute; top: calc(100% + 12px); right: 0; min-width: 190px; background: linear-gradient(145deg, rgba(22, 44, 109, 0.45) 0%, rgba(10, 16, 29, 0.94) 100%); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border-glass); border-radius: 14px; box-shadow: var(--shadow-glass); padding: 6px; transform-origin: top right; animation: fsdLangIn 0.25s var(--ease-expo); }
  @keyframes fsdLangIn { from { opacity: 0; transform: translateY(-6px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .fsd-lang-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 12px; border: none; border-radius: 9px; background: transparent; color: var(--text-muted); font-size: 14px; font-family: var(--font-body); cursor: pointer; transition: background 0.15s, color 0.15s; }
  .fsd-lang-item:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
  .fsd-lang-item[data-active="true"] { color: var(--text-primary); }

  /* ---------- Dashboard panels ---------- */
  .dash-grid { max-width: 1240px; margin: 0 auto; padding: 40px 32px 88px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; position: relative; z-index: 1; }
  .ds-c12 { grid-column: span 12; } .ds-c7 { grid-column: span 7; } .ds-c5 { grid-column: span 5; } .ds-c4 { grid-column: span 4; } .ds-c3 { grid-column: span 3; }
  @media (max-width: 1080px) { .ds-c7, .ds-c5 { grid-column: span 12; } .ds-c4, .ds-c3 { grid-column: span 6; } }
  @media (max-width: 720px) { .ds-c4, .ds-c3 { grid-column: span 12; } }

  .dash-panel { background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.012) 100%); border: 1px solid var(--border-hairline); border-radius: 28px; box-shadow: var(--shadow-widget); padding: 26px; display: flex; flex-direction: column; gap: 18px; scroll-margin-top: 88px; }
  .dash-kicker { font-size: 11px; letter-spacing: var(--tracking-widest); text-transform: uppercase; color: var(--text-muted); font-weight: 700; font-family: var(--font-body); }
  .dash-h { margin: 0; font-family: var(--font-display); font-weight: 700; letter-spacing: var(--tracking-tight); font-size: 18px; color: var(--text-primary); }

  .dash-chip { white-space: nowrap; padding: 6px 13px; border-radius: 999px; border: 1px solid var(--border-soft); background: rgba(255, 255, 255, 0.03); color: var(--text-muted); font-size: 12.5px; cursor: pointer; font-family: var(--font-body); transition: color 0.2s, border-color 0.2s, background 0.2s; }
  .dash-chip:hover { color: var(--text-primary); }
  .dash-chip[data-active="true"] { border-color: var(--border-accent); color: var(--blue-200); background: rgba(59, 130, 246, 0.1); }

  .dash-pill { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; padding: 4px 9px; border-radius: 999px; white-space: nowrap; }
  .dash-pill-emerald { background: rgba(16, 185, 129, 0.12); color: var(--emerald-400); }
  .dash-pill-zinc { background: rgba(255, 255, 255, 0.06); color: var(--text-muted); }

  .dash-bar { height: 4px; background: rgba(255, 255, 255, 0.06); border-radius: 999px; overflow: hidden; }
  .dash-bar i { display: block; height: 100%; background: var(--blue-500); border-radius: 999px; }

  .fsd-env { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="dashIcons.jsx"></script>
<script type="text/babel" src="DashboardNav.jsx"></script>
<script type="text/babel" src="MoneyPage.jsx"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById("root")).render(<MoneyPage />);
</script>
</body>
</html>
