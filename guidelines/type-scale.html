<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="96 hero → 10 micro" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); }
  .wrap { padding: 14px 24px; display: flex; flex-direction: column; gap: 2px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .row b { font-family: var(--font-display); font-weight: 700; letter-spacing: var(--tracking-tight); color: var(--text-primary); }
  .row span { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><b style="font-size:48px; letter-spacing:var(--tracking-tighter)">Hero</b><span>--text-hero · 96px (shown 48)</span></div>
  <div class="row"><b style="font-size:36px">Display</b><span>--text-display · 72px (shown 36)</span></div>
  <div class="row"><b style="font-size:30px">Heading 1</b><span>--text-h1 · 36px</span></div>
  <div class="row"><b style="font-size:24px">Heading 3</b><span>--text-h3 · 24px</span></div>
  <div class="row"><b style="font-size:16px; font-family:var(--font-body); font-weight:400">Body sixteen</b><span>--text-body · 16px</span></div>
  <div class="row"><b style="font-size:12px; font-family:var(--font-body); font-weight:500">Caption twelve</b><span>--text-xs · 12px</span></div>
  <div class="row"><b style="font-size:10px; font-family:var(--font-body); font-weight:700; letter-spacing:var(--tracking-widest); text-transform:uppercase">Micro kicker</b><span>--text-micro · 10px</span></div>
</div>
</body>
</html>
