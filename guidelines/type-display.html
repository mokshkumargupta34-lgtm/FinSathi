<!-- @dsCard group="Type" viewport="700x180" name="Display — Space Grotesk" subtitle="Heroes, wordmark; tracking −0.04em" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); }
  .wrap { padding: 20px 24px; display: flex; flex-direction: column; gap: 6px; }
  .hero { font-family: var(--font-display); font-weight: 700; font-size: 44px; letter-spacing: var(--tracking-tighter); line-height: 1.05; color: var(--text-primary); text-shadow: 0 10px 30px rgba(255,255,255,0.2), 0 2px 4px rgba(255,255,255,0.1); }
  .silver { font-family: var(--font-display); font-weight: 700; font-size: 44px; letter-spacing: var(--tracking-tighter); line-height: 1.05; background: var(--gradient-silver); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .mark { font-family: var(--font-display); font-weight: 700; font-size: 26px; letter-spacing: var(--tracking-tighter); text-transform: uppercase; background: var(--gradient-silver); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">Your money,</div>
  <div class="silver">in your language.</div>
  <div class="mark">FINSATHI · 700 / −0.04em / caps</div>
</div>
</body>
</html>
