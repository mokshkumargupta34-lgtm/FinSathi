<!-- @dsCard group="Type" viewport="700x190" name="Body — IBM Plex Sans" subtitle="With Devanagari sibling for vernacular UI" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); }
  .wrap { padding: 18px 24px; display: flex; flex-direction: column; gap: 8px; font-family: var(--font-body); }
  .lg { font-size: 18px; font-weight: 300; color: var(--text-secondary); line-height: var(--leading-relaxed); max-width: 560px; }
  .sm { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .dev { font-family: var(--font-devanagari); font-size: 18px; font-weight: 500; color: var(--text-primary); }
  .kicker { font-size: 10px; font-weight: 700; letter-spacing: var(--tracking-widest); text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Today · Kicker 10px / 700 / +0.2em</div>
  <div class="lg"><strong style="color: var(--text-primary); font-weight: 600;">FinSathi</strong> empowers every household with voice-first guidance, simple savings goals, and advice in the language you think in.</div>
  <div class="dev">आपका पैसा, आपकी भाषा। बोलिए, और आपका साथी सुनेगा।</div>
  <div class="sm">Label 14px medium — Email, Password, Full Name</div>
</div>
</body>
</html>
