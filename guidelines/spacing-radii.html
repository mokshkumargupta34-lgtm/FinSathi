<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="10 input → 40 card, 0 brutal" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); }
  .wrap { padding: 16px 24px; display: flex; gap: 16px; align-items: flex-end; }
  .chip { background: var(--gradient-card); border: 1px solid var(--border-soft); width: 92px; height: 92px; display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .chip span { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="chip" style="border-radius: var(--radius-brutal); border-color: #fff;"><span>brutal 0</span></div>
  <div class="chip" style="border-radius: var(--radius-input);"><span>input 10</span></div>
  <div class="chip" style="border-radius: var(--radius-widget);"><span>widget 16</span></div>
  <div class="chip" style="border-radius: var(--radius-btn);"><span>button 20</span></div>
  <div class="chip" style="border-radius: var(--radius-card-sm);"><span>card-sm 32</span></div>
  <div class="chip" style="border-radius: var(--radius-card);"><span>card 40</span></div>
</div>
</body>
</html>
