<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base · 4–96" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); }
  .wrap { padding: 18px 24px; display: flex; gap: 14px; align-items: flex-end; }
  .bar { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar i { display: block; width: 22px; background: linear-gradient(180deg, var(--blue-400), var(--navy-700)); border-radius: 4px; }
  .bar span { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar"><i style="height:4px"></i><span>4</span></div>
  <div class="bar"><i style="height:8px"></i><span>8</span></div>
  <div class="bar"><i style="height:12px"></i><span>12</span></div>
  <div class="bar"><i style="height:16px"></i><span>16</span></div>
  <div class="bar"><i style="height:24px"></i><span>24</span></div>
  <div class="bar"><i style="height:32px"></i><span>32</span></div>
  <div class="bar"><i style="height:40px"></i><span>40</span></div>
  <div class="bar"><i style="height:48px"></i><span>48</span></div>
  <div class="bar"><i style="height:64px"></i><span>64</span></div>
  <div class="bar"><i style="height:96px"></i><span>96</span></div>
</div>
</body>
</html>
