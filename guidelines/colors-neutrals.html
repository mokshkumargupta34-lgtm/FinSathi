<!-- @dsCard group="Colors" viewport="700x150" name="Silver & zinc neutrals" subtitle="Hardware and text neutrals" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); font-family: var(--font-mono); }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; padding: 14px; }
  .sw { height: 92px; border-radius: 10px; border: 1px solid var(--border-soft); padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; }
  .sw span { font-size: 9px; display: block; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background: var(--white);"><span style="color:#333">white</span></div>
  <div class="sw" style="background: var(--silver-100);"><span style="color:#333">silver-100</span></div>
  <div class="sw" style="background: var(--silver-200);"><span style="color:#333">silver-200</span></div>
  <div class="sw" style="background: var(--silver-400);"><span style="color:#222">silver-400</span></div>
  <div class="sw" style="background: var(--zinc-600);"><span style="color:#eee">zinc-600</span></div>
  <div class="sw" style="background: var(--zinc-700);"><span style="color:#eee">zinc-700</span></div>
  <div class="sw" style="background: var(--zinc-800);"><span style="color:#eee">zinc-800</span></div>
  <div class="sw" style="background: var(--zinc-900);"><span style="color:#eee">zinc-900</span></div>
</div>
</body>
</html>
