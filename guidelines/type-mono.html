<!-- @dsCard group="Type" viewport="700x150" name="Mono — IBM Plex Mono" subtitle="Scramble effects, data, ₹ amounts" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); }
  .wrap { padding: 18px 24px; display: flex; flex-direction: column; gap: 10px; font-family: var(--font-mono); }
  .scramble { font-size: 22px; font-weight: 500; color: var(--blue-400); }
  .data { font-size: 16px; color: var(--text-primary); }
  .data em { font-style: normal; color: var(--emerald-400); }
  .note { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="wrap">
  <div class="scramble">_!X$0-+*# → VOICE-FIRST</div>
  <div class="data">₹12,500 saved · <em>+8.2%</em> this month</div>
  <div class="note">Reserved for SpecialText, counters, and tabular figures.</div>
</div>
</body>
</html>
