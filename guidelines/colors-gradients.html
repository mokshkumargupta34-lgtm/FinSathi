<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-page); font-family: var(--font-mono); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px; }
  .sw { height: 92px; border-radius: 12px; border: 1px solid var(--border-soft); padding: 10px; box-sizing: border-box; display: flex; align-items: flex-end; }
  .sw span { font-size: 10px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background: var(--gradient-card);"><span style="color:#fff">--gradient-card</span></div>
  <div class="sw" style="background: var(--gradient-silver);"><span style="color:#222">--gradient-silver</span></div>
  <div class="sw" style="background: var(--gradient-btn-light);"><span style="color:#333">--gradient-btn-light</span></div>
  <div class="sw" style="background: var(--gradient-btn-dark);"><span style="color:#ddd">--gradient-btn-dark</span></div>
</div>
</body>
</html>
